# CI pipeline: lint → security scan → test
# Triggers on every push and pull request to main

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

#      - name: Run flake8
#        run: |
#          flake8 app/ --max-line-length=120 --exclude=__pycache__

  security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: |
          bandit -r app/ -ll

  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: security

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE_URI: ${{ secrets.DATABASE_URI }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short
